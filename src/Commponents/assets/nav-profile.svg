<svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bgRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a80"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </linearGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <style>
    .pulse {
      transform-origin: 45px 40px;
      animation: pulse 3s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    .text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 10px;
      font-weight: 600;
      fill: #fff;
      text-anchor: middle;
      dominant-baseline: middle;
      letter-spacing: 0.5px;
    }
  </style>

  <!-- Background -->
  <g class="pulse">
    <circle cx="45" cy="40" r="35" fill="url(#bgRed)" filter="url(#shadow)"/>
    <ellipse cx="35" cy="25" rx="14" ry="10" fill="rgba(255,255,255,0.2)" />
  </g>

  <!-- Head -->
  <circle cx="45" cy="30" r="9" fill="#fff"/>

  <!-- Body -->
  <path d="M27 50 C27 38, 63 38, 63 50" fill="#fff"/>

  <!-- Text inside -->
  <text x="45" y="65" class="text">
    Admin
  </text>

</svg>