<svg width="42" height="40" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- gradient modern -->
    <linearGradient id="cartGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>

    <!-- soft shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <style>
    svg {
      cursor: pointer;
      transition: transform 0.25s ease;
    }
    svg:hover {
      transform: translateY(-2px) scale(1.05);
    }
  </style>

  <!-- handle -->
  <path d="M4 5h3l2 8h18l-1.5 6H9"
        stroke="url(#cartGrad)"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#shadow)"/>

  <!-- cart body -->
  <path d="M9 11h16l-1.5 6H11z"
        fill="url(#cartGrad)"
        opacity="0.9"
        filter="url(#shadow)"/>

  <!-- wheels -->
  <circle cx="12" cy="26" r="2.2" fill="#222"/>
  <circle cx="22" cy="26" r="2.2" fill="#222"/>

</svg>
